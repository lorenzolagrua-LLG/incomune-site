<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InComune — La comunità di Novoli, in un'unica app</title>
<meta name="description" content="InComune: attività, eventi, associazioni e tutto ciò che riguarda Novoli (LE). Presto disponibile su App Store e Google Play.">
<style>
  :root {
    --primary: #1B4A8A;
    --primary-light: #EBF0FA;
    --text: #1E1E1E;
    --text-secondary: #555555;
    --bg: #F5F7FB;
    --card: #FFFFFF;
    --border: #D6DEE8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    -webkit-font-smoothing: antialiased;
    padding: 24px;
    text-align: center;
  }
  .container {
    max-width: 520px;
    width: 100%;
  }
  .logo-text {
    font-size: 42px;
    font-weight: 800;
    color: var(--primary);
    letter-spacing: -1px;
    margin-bottom: 8px;
  }
  .tagline {
    font-size: 17px;
    color: var(--text-secondary);
    margin-bottom: 40px;
    line-height: 1.5;
  }
  .badge {
    display: inline-block;
    background: var(--primary);
    color: white;
    font-size: 13px;
    font-weight: 600;
    padding: 6px 16px;
    border-radius: 20px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 32px;
  }
  .features {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 40px;
  }
  .feature {
    background: var(--card);
    border-radius: 14px;
    padding: 20px 16px;
    box-shadow: 0 1px 4px rgba(27,74,138,0.06);
  }
  .feature .emoji {
    font-size: 28px;
    margin-bottom: 8px;
  }
  .feature .label {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
  }
  .divider {
    width: 40px;
    height: 3px;
    background: var(--primary);
    border-radius: 2px;
    margin: 0 auto 32px;
  }
  .stores {
    font-size: 15px;
    color: var(--text-secondary);
    margin-bottom: 12px;
  }
  .store-badges {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-bottom: 40px;
    opacity: 0.4;
  }
  .store-badges a {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: #000;
    color: #fff;
    padding: 10px 20px;
    border-radius: 12px;
    text-decoration: none;
    font-size: 13px;
    line-height: 1.2;
    transition: opacity 0.2s;
  }
  .store-badges a:hover { opacity: 0.85; }
  .store-badges .store-icon { font-size: 26px; }
  .store-badges .store-label { text-align: left; }
  .store-badges .store-small { font-size: 10px; opacity: 0.8; display: block; }
  .store-badges .store-name { font-size: 17px; font-weight: 600; }
  .footer {
    font-size: 13px;
    color: var(--text-secondary);
    margin-top: 20px;
  }
  .footer a {
    color: var(--primary);
    text-decoration: none;
  }
  .footer a:hover {
    text-decoration: underline;
  }
  @media (max-width: 400px) {
    .logo-text { font-size: 34px; }
    .features { grid-template-columns: 1fr 1fr; gap: 8px; }
    .feature { padding: 16px 12px; }
  }
</style>
</head>
<body>

<div class="container">
  <div class="badge">Coming Soon</div>

  <div class="logo-text">InComune</div>
  <p class="tagline">La comunità di Novoli, in un'unica app.</p>

  <div class="features">
    <div class="feature">
      <div class="emoji">🏪</div>
      <div class="label">Attività</div>
    </div>
    <div class="feature">
      <div class="emoji">📅</div>
      <div class="label">Eventi</div>
    </div>
    <div class="feature">
      <div class="emoji">🤝</div>
      <div class="label">Associazioni</div>
    </div>
    <div class="feature">
      <div class="emoji">🏛️</div>
      <div class="label">Comune</div>
    </div>
  </div>

  <div class="divider"></div>

  <p class="stores">Presto disponibile su</p>
  <div class="store-badges">
    <a href="#">
      <svg class="store-icon" viewBox="0 0 24 24" width="28" height="28" fill="white"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
      <span class="store-label">
        <span class="store-small">Scarica su</span>
        <span class="store-name">App Store</span>
      </span>
    </a>
    <a href="#">
      <svg class="store-icon" viewBox="0 0 24 24" width="28" height="28" fill="white"><path d="M3 20.5v-17c0-.59.34-1.11.84-1.35L13.69 12l-9.85 9.85c-.5-.24-.84-.76-.84-1.35zm13.81-5.38L6.05 21.34l8.49-8.49 2.27 2.27zm.91-.91L19.59 12l-1.87-2.21-2.27 2.27 2.27 2.15zM6.05 2.66l10.76 6.22-2.27 2.27-8.49-8.49z"/></svg>
      <span class="store-label">
        <span class="store-small">Disponibile su</span>
        <span class="store-name">Google Play</span>
      </span>
    </a>
  </div>

  <div class="footer">
    <a href="/privacy-policy">Privacy Policy</a>
  </div>
</div>

</body>
</html>
