<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InComune — La comunità di Novoli, in un'unica app</title>
<meta name="description" content="InComune: attività, eventi, associazioni e tutto ciò che riguarda Novoli (LE). Presto disponibile su App Store e Google Play.">
<style>
  :root {
    --primary: #1B4A8A;
    --primary-light: #EBF0FA;
    --text: #1E1E1E;
    --text-secondary: #555555;
    --bg: #F5F7FB;
    --card: #FFFFFF;
    --border: #D6DEE8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    -webkit-font-smoothing: antialiased;
    padding: 24px;
    text-align: center;
  }
  .container {
    max-width: 520px;
    width: 100%;
  }
  .logo-text {
    font-size: 42px;
    font-weight: 800;
    color: var(--primary);
    letter-spacing: -1px;
    margin-bottom: 8px;
  }
  .tagline {
    font-size: 17px;
    color: var(--text-secondary);
    margin-bottom: 40px;
    line-height: 1.5;
  }
  .badge {
    display: inline-block;
    background: var(--primary);
    color: white;
    font-size: 13px;
    font-weight: 600;
    padding: 6px 16px;
    border-radius: 20px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 32px;
  }
  .features {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 40px;
  }
  .feature {
    background: var(--card);
    border-radius: 14px;
    padding: 20px 16px;
    box-shadow: 0 1px 4px rgba(27,74,138,0.06);
  }
  .feature .emoji {
    font-size: 28px;
    margin-bottom: 8px;
  }
  .feature .label {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
  }
  .divider {
    width: 40px;
    height: 3px;
    background: var(--primary);
    border-radius: 2px;
    margin: 0 auto 32px;
  }
  .stores {
    font-size: 15px;
    color: var(--text-secondary);
    margin-bottom: 12px;
  }
  .store-badges {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-bottom: 40px;
    opacity: 0.4;
  }
  .store-badges img {
    height: 44px;
    border-radius: 8px;
  }
  .footer {
    font-size: 13px;
    color: var(--text-secondary);
    margin-top: 20px;
  }
  .footer a {
    color: var(--primary);
    text-decoration: none;
  }
  .footer a:hover {
    text-decoration: underline;
  }
  @media (max-width: 400px) {
    .logo-text { font-size: 34px; }
    .features { grid-template-columns: 1fr 1fr; gap: 8px; }
    .feature { padding: 16px 12px; }
  }
</style>
</head>
<body>

<div class="container">
  <div class="badge">Coming Soon</div>

  <div class="logo-text">InComune</div>
  <p class="tagline">La comunità di Novoli, in un'unica app.</p>

  <div class="features">
    <div class="feature">
      <div class="emoji">🏪</div>
      <div class="label">Attività</div>
    </div>
    <div class="feature">
      <div class="emoji">📅</div>
      <div class="label">Eventi</div>
    </div>
    <div class="feature">
      <div class="emoji">🤝</div>
      <div class="label">Associazioni</div>
    </div>
    <div class="feature">
      <div class="emoji">🏛️</div>
      <div class="label">Comune</div>
    </div>
  </div>

  <div class="divider"></div>

  <p class="stores">Presto disponibile su</p>
  <div class="store-badges">
    <img src="/assets/app-store-badge.svg" alt="Scarica su App Store">
    <img src="https://play.google.com/intl/en_us/badges/static/images/badges/it_badge_web_generic.png" alt="Disponibile su Google Play">
  </div>

  <div class="footer">
    <a href="/privacy-policy">Privacy Policy</a>
  </div>
</div>

</body>
</html>
